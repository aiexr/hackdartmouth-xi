name: Cloudflare Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CI: "true"
      FORCE_COLOR: "0"
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Validate Cloudflare credentials
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_API_TOKEN}" ]]; then
            echo "Missing GitHub secret: CLOUDFLARE_API_TOKEN" >&2
            exit 1
          fi

          if [[ -z "${CLOUDFLARE_ACCOUNT_ID}" ]]; then
            echo "Missing GitHub secret: CLOUDFLARE_ACCOUNT_ID" >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --progress=false

      - name: Build app for Cloudflare
        run: npx @opennextjs/cloudflare build

      - name: Deploy to Cloudflare Workers
        run: npx @opennextjs/cloudflare deploy
