name: Cloudflare Deploy

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      deployment_mode: ${{ steps.meta.outputs.mode }}
      environment_name: ${{ steps.meta.outputs.environment }}
      deployment_url: ${{ steps.deployment_url.outputs.url }}
    env:
      CI: "true"
      FORCE_COLOR: "0"
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_PRODUCTION_URL: ${{ vars.CLOUDFLARE_PRODUCTION_URL }}
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Validate Cloudflare credentials
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${CLOUDFLARE_API_TOKEN}" ]]; then
            echo "Missing GitHub secret: CLOUDFLARE_API_TOKEN" >&2
            exit 1
          fi

          if [[ -z "${CLOUDFLARE_ACCOUNT_ID}" ]]; then
            echo "Missing GitHub secret: CLOUDFLARE_ACCOUNT_ID" >&2
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --progress=false

      - name: Decide deployment mode
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          branch_name="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          branch_slug="$(printf '%s' "$branch_name" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-+/-/g')"

          if [[ -z "${branch_slug}" ]]; then
            branch_slug="branch"
          fi

          if [[ "${GITHUB_REF_NAME}" == "${DEFAULT_BRANCH}" ]]; then
            echo "mode=production" >> "$GITHUB_OUTPUT"
            echo "environment=production" >> "$GITHUB_OUTPUT"
          else
            echo "mode=preview" >> "$GITHUB_OUTPUT"
            echo "environment=cloudflare-preview-${branch_slug}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build app for Cloudflare
        run: npx @opennextjs/cloudflare build

      - name: Upload preview version
        id: preview
        if: steps.meta.outputs.mode == 'preview'
        shell: bash
        run: |
          set -euo pipefail

          log_file="${RUNNER_TEMP}/cloudflare-preview.log"
          clean_log_file="${RUNNER_TEMP}/cloudflare-preview-clean.log"

          npx @opennextjs/cloudflare upload |& tee "${log_file}"
          perl -pe 's/\e\[[0-9;]*[A-Za-z]//g' "${log_file}" > "${clean_log_file}"

          preview_url="$(grep -oE 'Version Preview URL: https://[^[:space:]]+' "${clean_log_file}" | tail -n 1 | sed 's/^Version Preview URL: //')"
          preview_alias_url="$(grep -oE 'Version Preview Alias URL: https://[^[:space:]]+' "${clean_log_file}" | tail -n 1 | sed 's/^Version Preview Alias URL: //')"

          if [[ -z "${preview_url}" && -z "${preview_alias_url}" ]]; then
            echo "Cloudflare upload succeeded, but no preview URL was found in the CLI output." >&2
            exit 1
          fi

          echo "url=${preview_url}" >> "$GITHUB_OUTPUT"
          echo "alias_url=${preview_alias_url}" >> "$GITHUB_OUTPUT"

      - name: Deploy production worker
        id: production
        if: steps.meta.outputs.mode == 'production'
        shell: bash
        run: |
          set -euo pipefail

          npx @opennextjs/cloudflare deploy |& tee "${RUNNER_TEMP}/cloudflare-production.log"

          if [[ -n "${CLOUDFLARE_PRODUCTION_URL}" ]]; then
            echo "url=${CLOUDFLARE_PRODUCTION_URL}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve deployment URL
        id: deployment_url
        shell: bash
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
          PREVIEW_ALIAS_URL: ${{ steps.preview.outputs.alias_url }}
          PRODUCTION_URL: ${{ steps.production.outputs.url }}
        run: |
          set -euo pipefail

          if [[ -n "${PRODUCTION_URL}" ]]; then
            echo "url=${PRODUCTION_URL}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${PREVIEW_ALIAS_URL}" ]]; then
            echo "url=${PREVIEW_ALIAS_URL}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${PREVIEW_URL}" ]]; then
            echo "url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"
          else
            echo "url=" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish deployment URL to workflow summary
        if: steps.deployment_url.outputs.url != ''
        shell: bash
        env:
          DEPLOYMENT_MODE: ${{ steps.meta.outputs.mode }}
          DEPLOYMENT_URL: ${{ steps.deployment_url.outputs.url }}
        run: |
          set -euo pipefail

          if [[ "${DEPLOYMENT_MODE}" == "preview" ]]; then
            label="Preview URL"
          else
            label="Deployment URL"
          fi

          echo "::notice title=${label}::${DEPLOYMENT_URL}"
          {
            echo "## ${label}"
            echo
            echo "- ${DEPLOYMENT_URL}"
            echo "- [Workflow run](${WORKFLOW_RUN_URL})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish deployment URL commit status
        if: steps.deployment_url.outputs.url != ''
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_MODE: ${{ steps.meta.outputs.mode }}
          DEPLOYMENT_URL: ${{ steps.deployment_url.outputs.url }}
        with:
          script: |
            const isPreview = process.env.DEPLOYMENT_MODE === "preview";
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: "success",
              context: isPreview ? "Cloudflare Preview URL" : "Cloudflare Deployment URL",
              description: isPreview ? "Open the deployed preview" : "Open the deployed app",
              target_url: process.env.DEPLOYMENT_URL,
            });

  record-deployment:
    runs-on: ubuntu-latest
    needs: deploy
    if: needs.deploy.result == 'success' && needs.deploy.outputs.deployment_url != ''
    environment:
      name: ${{ needs.deploy.outputs.environment_name }}
      url: ${{ needs.deploy.outputs.deployment_url }}
    steps:
      - name: Record deployment in GitHub environments
        run: |
          echo "Environment: ${{ needs.deploy.outputs.environment_name }}"
          echo "URL: ${{ needs.deploy.outputs.deployment_url }}"
